<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Memora App</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background-color: #f0f2f5;
    }

    .smartphone-frame {
      width: 375px;
      height: 667px;
      background-color: #000;
      border-radius: 36px;
      padding: 10px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
      position: relative;
      overflow: hidden;
    }

    .smartphone-screen {
      width: 100%;
      height: 100%;
      border-radius: 26px;
      overflow: hidden;
      background: linear-gradient(135deg, #A0C4FD, #C3B1E1);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      align-items: center;
      padding: 20px;
      box-sizing: border-box;
    }

    .status-bar {
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 10px;
      color: #ffffff;
      font-size: 0.8rem;
      font-weight: 600;
    }

    .notch {
      width: 120px;
      height: 25px;
      background-color: #000;
      border-bottom-left-radius: 15px;
      border-bottom-right-radius: 15px;
      position: absolute;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
    }

    .home-indicator {
      width: 120px;
      height: 5px;
      background-color: #ffffff;
      border-radius: 5px;
      position: absolute;
      bottom: 15px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
    }

    .app-logo {
      max-width: 250px;
      max-height: 250px;
      object-fit: contain;
      margin-top: 5px;
    }

    .button-gradient {
      background: linear-gradient(90deg, #2B3F99, #390797);
      color: #ffffff;
    }

    .smartphone-screen h1,
    .smartphone-screen p {
      color: #ffffff;
    }

    .button-secondary {
      background-color: rgba(255, 255, 255, 0.2);
      color: #ffffff;
      border: 1px solid rgba(255, 255, 255, 0.3);
      backdrop-filter: blur(5px);
    }
  </style>
</head>
<body>
  <div class="smartphone-frame">
    <div class="notch"></div>
    <div class="smartphone-screen">
      <!-- Status Bar -->
      <div class="status-bar">
        <span>9:41 AM</span>
        <div class="flex items-center space-x-1">
          <span>&#x1F6B2;</span>
          <span>&#x1F50A;</span>
          <span>100%</span>
          <span>&#x1F50B;</span>
        </div>
      </div>

      <!-- App Content -->
      <div class="flex flex-col items-center justify-center flex-grow text-center px-4">
        <img src="../assets/logo.png" alt="Memora Logo" class="app-logo">
        <h1 class="text-4xl font-bold mt-4 drop-shadow-lg">Memora</h1>
        <p class="text-base sm:text-lg mt-2 opacity-90 leading-relaxed max-w-[300px]">
          Connecting memories, empowering care. <br />
          Your trusted companion for dementia support.
        </p>
        <div class="mt-8 w-full px-6">
          <button class="w-full py-3 rounded-full button-gradient font-semibold text-lg shadow-lg hover:shadow-xl transition-all duration-300 transform hover:-translate-y-1">
            Download Now
          </button>
          <button class="w-full py-3 mt-4 rounded-full button-secondary font-semibold text-lg hover:bg-opacity-30 transition-all duration-300">
            Learn More
          </button>
        </div>
      </div>

      <!-- Home Indicator -->
      <div class="home-indicator"></div>
    </div>
  </div>
</body>
</html>
